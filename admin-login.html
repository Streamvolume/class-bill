<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班委登录 — 班费管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<div class="login-page">

  <!-- 返回首页 -->
  <a href="index.html" class="login-back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    返回公示页
  </a>

  <!-- 登录卡片 -->
  <div class="login-card">
    <div class="login-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="9" width="14" height="10" rx="2" stroke="var(--accent)" stroke-width="1.5"/>
        <path d="M6.5 9V6.5a3.5 3.5 0 0 1 7 0V9" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="login-title">班委后台</div>
    <div class="login-subtitle">
      输入动账密码以进入管理后台。<br>
      密码将在本地解密凭证，不会发送至任何服务器。
    </div>

    <div id="loginAlert"></div>

    <div class="field-group">
      <label class="field-label">动账密码</label>
      <input type="password" class="field-input" id="passInput"
             placeholder="至班委群获取"
             autofocus
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:0.25rem" onclick="doLogin()">
      验证并进入
    </button>

    <div style="margin-top:1rem;font-size:0.7rem;color:var(--text-3);text-align:center;line-height:1.6">
      GitHub 模式 · AES-256-GCM 本地解密
    </div>
  </div>

  <!-- 登录页底栏 -->
  <div style="margin-top:3rem;text-align:center">
    <span style="font-size:0.7rem;color:var(--text-3);font-family:var(--font-mono)">
      班费公示平台 · 药学2023级231班 · Built by Streamvolume
    </span>
  </div>

</div>

<button class="theme-switcher" id="themeSwitcher" onclick="nextTheme()">—</button>

<script src="themes.js"></script>
<script src="data.js"></script>
<script>
// 本地模式后备密码（与 app.js 保持一致）
const ADMIN_PASSWORD = 'banwei2023';

async function doLogin() {
  const pass    = document.getElementById('passInput').value;
  const alertEl = document.getElementById('loginAlert');
  const btn     = document.getElementById('loginBtn');

  alertEl.innerHTML = '';
  if (!pass) {
    alertEl.innerHTML = '<div class="alert alert-error">请输入动账密码</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '验证中…';

  try {
    if (typeof MODE !== 'undefined' && MODE === 'github') {
      await unlockWithPassphrase(pass);
    } else {
      if (pass !== ADMIN_PASSWORD) throw new Error('密码错误，请重试');
    }
    // 验证成功：将密码存入 sessionStorage，跳转后台
    sessionStorage.setItem('banfei_session_pass', pass);
    window.location.href = 'admin.html';
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '验证并进入';
  }
}

// 初始化主题，隐藏 loading
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 400);
});
</script>
</body>
</html>
