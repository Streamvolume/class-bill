<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班费公示平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
<div class="mode-badge" id="modeBadge">—</div>

<!-- 侧栏班委入口 -->
<div class="sidebar-admin">
  <a class="sidebar-admin-btn" href="admin-login.html" title="班委管理后台">
    <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="6" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M4.5 6V4a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    班委入口
  </a>
</div>

<!-- ZONE 1: 英雄区 -->
<section id="zone-hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <div class="hero-header">
      <div class="class-badge" id="classBadge">加载中…</div>
      <div class="platform-title">班费公示平台</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">入学至今</div>
        <div class="stat-value" id="statDays">—</div>
        <div class="stat-unit">天</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">资金调用</div>
        <div class="stat-value" id="statCount">—</div>
        <div class="stat-unit">次出账记录</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">账户余额</div>
        <div class="stat-value" id="statBalance">—</div>
        <div class="stat-unit">元人民币</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">人均剩余</div>
        <div class="stat-value" id="statPerPerson">—</div>
        <div class="stat-unit">元 / 人</div>
      </div>
    </div>
  </div>
  <div class="scroll-hint" onclick="document.getElementById('zone-ledger').scrollIntoView({behavior:'smooth'})">
    <span>查看明细</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 2v10M2 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</section>

<!-- ZONE 2: 明细区（只读） -->
<section id="zone-ledger">
  <div class="reveal">
    <div class="section-label">完整账单</div>
    <div class="section-title">收支明细</div>
  </div>
  <div class="filter-tabs reveal" id="filterTabs">
    <button class="tab active" data-filter="all">全部</button>
    <button class="tab" data-filter="income">入账</button>
    <button class="tab" data-filter="expense">出账</button>
    <button class="tab" data-filter="unconfirmed">待确认</button>
  </div>
  <table class="ledger-table reveal">
    <thead>
      <tr>
        <th>日期</th><th>类型</th><th>摘要</th><th>标签</th><th>金额（元）</th><th>核实</th>
      </tr>
    </thead>
    <tbody id="ledgerBody"></tbody>
  </table>
  <div class="ledger-cards reveal" id="ledgerCards"></div>
</section>

<!-- 底栏 -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <div class="footer-col-title">关于本站</div>
      <p>班费公示平台 v2</p>
      <p>数据托管于 GitHub，公开透明</p>
      <p>每次动账由班委核实确认</p>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">联系方式</div>
      <p>管理员：生活委员</p>
      <a href="mailto:your@email.com">your@email.com</a>
      <p style="margin-top:0.25rem;font-size:0.72rem">如有疑问请联系班委</p>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">友情链接</div>
      <a href="https://www.njucm.edu.cn" target="_blank" rel="noopener">南京中医药大学官网</a>
      <a href="https://github.com/Streamvolume/class-bill" target="_blank" rel="noopener">数据仓库 GitHub</a>
      <a href="https://pages.github.com" target="_blank" rel="noopener">托管：GitHub Pages</a>
    </div>
  </div>
  <hr class="footer-divider">
  <div class="footer-bottom">
    <span>班费公示平台 · 药学2023级X班</span>
    <span>Built by Streamvolume · Hosted on GitHub Pages</span>
  </div>
</footer>

<button class="theme-switcher" id="themeSwitcher" onclick="nextTheme()">—</button>
<script src="themes.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
